services:
  openemr-8x-mysql:
    image: mariadb:10.11
    container_name: openemr-8x-mysql-1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    volumes:
      - openemr-8x-mysql-data:/var/lib/mysql
    networks:
      - openemr-8x-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  openemr-8x:
    image: openemr/openemr:8.0.1
    container_name: openemr-8x-1
    ports:
      - "8082:80"
      - "9444:443"
    environment:
      MYSQL_HOST: openemr-8x-mysql
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
      OE_USER: admin
      OE_PASS: pass
    depends_on:
      openemr-8x-mysql:
        condition: service_healthy
    volumes:
      - openemr-8x-sites:/var/www/localhost/htdocs/openemr/sites
    networks:
      - openemr-8x-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/interface/login/login.php"]
      interval: 30s
      timeout: 10s
      retries: 5

  mocklab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mocklab-1
    ports:
      - "${MOCKLAB_PORT:-5001}:5001"
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      openemr-8x:
        condition: service_healthy
    volumes:
      - openemr-8x-sites:/var/www/localhost/htdocs/openemr/sites
    networks:
      - openemr-8x-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  openemr-8x-mysql-data:
  openemr-8x-sites:

networks:
  openemr-8x-network:
    driver: bridge
